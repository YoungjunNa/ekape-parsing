name: EKAPE Data Parsing

on:
  schedule:
    # 매일 오전 9시 (KST) = UTC 00:00, 월-금만 (1-5)
    - cron: '0 0 * * 1-5'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  parse-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev fonts-noto-cjk
          fc-cache -f

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::rvest
            any::readr
            any::prophet
            any::ggplot2
            any::tidyr
            any::patchwork
            any::scales
            any::lubridate
            any::forecast
      
      - name: Run parsing script
        run: |
          Rscript ekape-parsingscript-action.R
      
      - name: Run forecast script
        run: |
          Rscript ekape-forecast.R
      
      - name: Generate forecast plot
        run: |
          Rscript generate-plot.R
      
      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data_hanwoo_stock/ assets/
          git diff --staged --quiet || git commit -m "Update hanwoo stock data & forecast - $(date +'%Y-%m-%d')"
          git push
