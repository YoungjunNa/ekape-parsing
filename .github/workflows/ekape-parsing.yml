name: EKAPE Data Parsing

on:
  schedule:
    # 매일 오전 9시 (KST) = UTC 00:00, 월-금만 (1-5)
    - cron: '0 0 * * 1-5'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  parse-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev
      
      - name: Cache R packages
        id: cache-r-packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-4.3.2-${{ hashFiles('.github/workflows/ekape-parsing.yml') }}

      - name: Install R packages
        if: steps.cache-r-packages.outputs.cache-hit != 'true'
        run: |
          install.packages(c(
            "dplyr",
            "rvest",
            "readr"
          ), repos = "https://cloud.r-project.org/")
        shell: Rscript {0}
      
      - name: Run parsing script
        run: |
          Rscript ekape-parsingscript-action.R
      
      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data_hanwoo_stock/
          git diff --staged --quiet || git commit -m "Update hanwoo stock data - $(date +'%Y-%m-%d')"
          git push
